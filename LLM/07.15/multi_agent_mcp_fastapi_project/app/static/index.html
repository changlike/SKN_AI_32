<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>Multi-Agent MCP RAG</title><style>body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto}textarea,select,button{width:100%;margin:6px 0;padding:10px}pre{background:#f3f3f3;padding:14px;white-space:pre-wrap}</style></head><body><h1>Multi-Agent MCP RAG Assistant</h1><p>먼저 Vector DB 색인을 실행한 뒤 질문합니다.</p><button onclick="ingest()">Vector DB 색인</button><textarea id="q" rows="4">환불은 며칠 안에 신청해야 하나요?</textarea><select id="provider"><option>gemini</option><option>openai</option></select><select id="router"><option>hybrid</option><option>rule</option><option>llm</option></select><button onclick="chat()">질문 실행</button><pre id="out"></pre><script>async function ingest(){out.textContent=JSON.stringify(await (await fetch('/api/vector/ingest',{method:'POST'})).json(),null,2)}async function chat(){const body={question:q.value,provider:provider.value,router_type:router.value};out.textContent=JSON.stringify(await (await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json(),null,2)}</script></body></html>
