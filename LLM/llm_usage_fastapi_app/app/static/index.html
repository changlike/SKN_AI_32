<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI + Gemini LLM 예제 앱</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <main class="container">
        <h1>OpenAI + Gemini LLM 예제 앱</h1>
        <p>문장 생성, 질의응답, 요약, 번역, 채팅, Use Case를 동일한 config 설정으로 실행합니다.</p>

        <section class="panel">
            <label>API 종류</label>
            <select id="provider">
                <option value="openai">OpenAI API</option>
                <option value="gemini">Gemini API</option>
            </select>

            <label>기능</label>
            <select id="taskType">
                <option value="sentence">문장 생성</option>
                <option value="qa">질의 응답</option>
                <option value="summary">요약</option>
                <option value="translation">번역</option>
                <option value="chat">채팅</option>
                <option value="usecase">다양한 Use Case</option>
            </select>

            <label>모델명</label>
            <input id="model" placeholder="비우면 .env 기본 모델 사용" />

            <label>System Instruction</label>
            <textarea id="systemInstruction">친절하고 정확한 AI 강사처럼 답변하시오.</textarea>

            <div class="grid">
                <div>
                    <label>temperature</label>
                    <input id="temperature" type="number" step="0.1" value="0.7" />
                </div>
                <div>
                    <label>top_p</label>
                    <input id="topP" type="number" step="0.05" value="0.95" />
                </div>
                <div>
                    <label>max_output_tokens</label>
                    <input id="maxOutputTokens" type="number" value="800" />
                </div>
            </div>

            <label>Prompt</label>
            <textarea id="prompt">LLM의 주요 기능과 활용 사례를 설명하시오.</textarea>

            <button id="runButton">실행</button>
        </section>

        <section class="panel">
            <h2>결과</h2>
            <pre id="result">결과가 여기에 표시됩니다.</pre>
        </section>
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
